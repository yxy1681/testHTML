<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        .game-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            border: 1px solid rgba(255, 255, 255, 0.18);
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .title {
            color: white;
            font-size: 36px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            margin-bottom: 10px;
        }

        .score-board {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
        }

        .score-item {
            background: rgba(255, 255, 255, 0.2);
            padding: 10px 20px;
            border-radius: 10px;
            color: white;
            font-size: 18px;
            font-weight: bold;
        }

        .score-label {
            font-size: 14px;
            opacity: 0.8;
        }

        .score-value {
            font-size: 24px;
            margin-top: 5px;
        }

        #gameCanvas {
            background: #1a1a2e;
            border-radius: 15px;
            display: block;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            cursor: pointer;
        }

        .controls {
            margin-top: 20px;
            text-align: center;
            color: white;
        }

        .btn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin: 5px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        .instructions {
            margin-top: 15px;
            font-size: 14px;
            opacity: 0.9;
        }

        .mobile-controls {
            display: none;
            margin-top: 20px;
            gap: 10px;
        }

        .d-pad {
            display: grid;
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(3, 60px);
            gap: 5px;
            justify-content: center;
        }

        .d-pad-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            color: white;
            font-size: 24px;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .d-pad-btn:active {
            background: rgba(255, 255, 255, 0.4);
        }

        .d-pad-btn.up {
            grid-column: 2;
            grid-row: 1;
        }

        .d-pad-btn.down {
            grid-column: 2;
            grid-row: 3;
        }

        .d-pad-btn.left {
            grid-column: 1;
            grid-row: 2;
        }

        .d-pad-btn.right {
            grid-column: 3;
            grid-row: 2;
        }

        @media (max-width: 768px) {
            .mobile-controls {
                display: block;
            }

            #gameCanvas {
                max-width: 100%;
                height: auto;
            }

            .game-container {
                padding: 20px;
            }

            .title {
                font-size: 28px;
            }
        }

        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            display: none;
            color: white;
            z-index: 1000;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
        }

        .game-over h2 {
            font-size: 36px;
            margin-bottom: 20px;
            color: #f5576c;
        }

        .game-over p {
            font-size: 24px;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <div class="title">🐍 贪吃蛇</div>
            <div class="score-board">
                <div class="score-item">
                    <div class="score-label">当前得分</div>
                    <div class="score-value" id="currentScore">0</div>
                </div>
                <div class="score-item">
                    <div class="score-label">最高得分</div>
                    <div class="score-value" id="highScore">0</div>
                </div>
            </div>
        </div>

        <canvas id="gameCanvas" width="600" height="600"></canvas>

        <div class="controls">
            <button class="btn" id="startBtn" onclick="startGame()">开始游戏</button>
            <button class="btn" id="pauseBtn" onclick="togglePause()">暂停</button>
            <div class="instructions">
                <p>使用方向键 ↑ ↓ ← → 控制蛇的移动</p>
                <p>按空格键 暂停/继续</p>
            </div>
        </div>

        <div class="mobile-controls">
            <div class="d-pad">
                <button class="d-pad-btn up" onclick="changeDirection('up')">↑</button>
                <button class="d-pad-btn left" onclick="changeDirection('left')">←</button>
                <button class="d-pad-btn right" onclick="changeDirection('right')">→</button>
                <button class="d-pad-btn down" onclick="changeDirection('down')">↓</button>
            </div>
        </div>
    </div>

    <div class="game-over" id="gameOver">
        <h2>游戏结束!</h2>
        <p>得分: <span id="finalScore">0</span></p>
        <button class="btn" onclick="restartGame()">重新开始</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gridSize = 20;
        const gridWidth = canvas.width / gridSize;
        const gridHeight = canvas.height / gridSize;

        let snake = [];
        let direction = { x: 0, y: 0 };
        let food = {};
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let gameLoop = null;
        let isPaused = false;
        let isGameOver = false;

        document.getElementById('highScore').textContent = highScore;

        function initGame() {
            snake = [
                { x: Math.floor(gridWidth / 2), y: Math.floor(gridHeight / 2) },
                { x: Math.floor(gridWidth / 2) - 1, y: Math.floor(gridHeight / 2) },
                { x: Math.floor(gridWidth / 2) - 2, y: Math.floor(gridHeight / 2) }
            ];
            direction = { x: 1, y: 0 };
            generateFood();
            score = 0;
            updateScore();
            isGameOver = false;
            isPaused = false;
            document.getElementById('gameOver').style.display = 'none';
        }

        function generateFood() {
            do {
                food = {
                    x: Math.floor(Math.random() * gridWidth),
                    y: Math.floor(Math.random() * gridHeight)
                };
            } while (snake.some(segment => segment.x === food.x && segment.y === food.y));
        }

        function draw() {
            // 清空画布
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 绘制网格背景
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
            ctx.lineWidth = 1;
            for (let i = 0; i <= gridWidth; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();
            }
            for (let i = 0; i <= gridHeight; i++) {
                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }

            // 绘制蛇
            snake.forEach((segment, index) => {
                if (index === 0) {
                    // 蛇头 - 渐变效果
                    const gradient = ctx.createRadialGradient(
                        segment.x * gridSize + gridSize / 2,
                        segment.y * gridSize + gridSize / 2,
                        0,
                        segment.x * gridSize + gridSize / 2,
                        segment.y * gridSize + gridSize / 2,
                        gridSize / 2
                    );
                    gradient.addColorStop(0, '#4ade80');
                    gradient.addColorStop(1, '#22c55e');
                    ctx.fillStyle = gradient;
                } else {
                    // 蛇身 - 颜色渐变
                    const intensity = 1 - (index / snake.length) * 0.5;
                    ctx.fillStyle = `rgba(34, 197, 94, ${intensity})`;
                }

                // 绘制圆角矩形
                const x = segment.x * gridSize;
                const y = segment.y * gridSize;
                const radius = 5;

                ctx.beginPath();
                ctx.roundRect(x + 1, y + 1, gridSize - 2, gridSize - 2, radius);
                ctx.fill();

                // 绘制蛇眼睛
                if (index === 0) {
                    ctx.fillStyle = 'white';
                    const eyeSize = 3;
                    let eye1X, eye1Y, eye2X, eye2Y;

                    if (direction.x === 1) { // 向右
                        eye1X = x + gridSize - 6;
                        eye1Y = y + 5;
                        eye2X = x + gridSize - 6;
                        eye2Y = y + gridSize - 7;
                    } else if (direction.x === -1) { // 向左
                        eye1X = x + 4;
                        eye1Y = y + 5;
                        eye2X = x + 4;
                        eye2Y = y + gridSize - 7;
                    } else if (direction.y === -1) { // 向上
                        eye1X = x + 5;
                        eye1Y = y + 4;
                        eye2X = x + gridSize - 7;
                        eye2Y = y + 4;
                    } else { // 向下
                        eye1X = x + 5;
                        eye1Y = y + gridSize - 6;
                        eye2X = x + gridSize - 7;
                        eye2Y = y + gridSize - 6;
                    }

                    ctx.beginPath();
                    ctx.arc(eye1X, eye1Y, eyeSize, 0, Math.PI * 2);
                    ctx.fill();

                    ctx.beginPath();
                    ctx.arc(eye2X, eye2Y, eyeSize, 0, Math.PI * 2);
                    ctx.fill();

                    ctx.fillStyle = 'black';
                    ctx.beginPath();
                    ctx.arc(eye1X + (direction.x || 0), eye1Y + (direction.y || 0), 1.5, 0, Math.PI * 2);
                    ctx.fill();

                    ctx.beginPath();
                    ctx.arc(eye2X + (direction.x || 0), eye2Y + (direction.y || 0), 1.5, 0, Math.PI * 2);
                    ctx.fill();
                }
            });

            // 绘制食物 - 带光晕效果
            const foodX = food.x * gridSize + gridSize / 2;
            const foodY = food.y * gridSize + gridSize / 2;

            // 光晕
            const glowGradient = ctx.createRadialGradient(foodX, foodY, 0, foodX, foodY, gridSize);
            glowGradient.addColorStop(0, 'rgba(239, 68, 68, 0.5)');
            glowGradient.addColorStop(1, 'rgba(239, 68, 68, 0)');
            ctx.fillStyle = glowGradient;
            ctx.fillRect(food.x * gridSize - gridSize / 2, food.y * gridSize - gridSize / 2,
                        gridSize * 2, gridSize * 2);

            // 食物本体
            const foodGradient = ctx.createRadialGradient(foodX, foodY, 0, foodX, foodY, gridSize / 2);
            foodGradient.addColorStop(0, '#fbbf24');
            foodGradient.addColorStop(1, '#ef4444');
            ctx.fillStyle = foodGradient;
            ctx.beginPath();
            ctx.arc(foodX, foodY, gridSize / 2 - 2, 0, Math.PI * 2);
            ctx.fill();

            // 食物高光
            ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
            ctx.beginPath();
            ctx.arc(foodX - 3, foodY - 3, 3, 0, Math.PI * 2);
            ctx.fill();
        }

        function update() {
            if (isPaused || isGameOver) return;

            const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };

            // 检查碰撞
            if (head.x < 0 || head.x >= gridWidth || head.y < 0 || head.y >= gridHeight) {
                gameOver();
                return;
            }

            if (snake.some(segment => segment.x === head.x && segment.y === head.y)) {
                gameOver();
                return;
            }

            snake.unshift(head);

            // 检查是否吃到食物
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                updateScore();
                generateFood();
            } else {
                snake.pop();
            }

            draw();
        }

        function updateScore() {
            document.getElementById('currentScore').textContent = score;
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHighScore', highScore);
                document.getElementById('highScore').textContent = highScore;
            }
        }

        function gameOver() {
            isGameOver = true;
            clearInterval(gameLoop);
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOver').style.display = 'block';
            document.getElementById('startBtn').textContent = '重新开始';
        }

        function startGame() {
            if (gameLoop) {
                clearInterval(gameLoop);
            }
            initGame();
            draw();
            gameLoop = setInterval(update, 100);
            document.getElementById('startBtn').textContent = '重新开始';
            isPaused = false;
        }

        function restartGame() {
            startGame();
        }

        function togglePause() {
            if (isGameOver) return;

            isPaused = !isPaused;
            document.getElementById('pauseBtn').textContent = isPaused ? '继续' : '暂停';
        }

        function changeDirection(dir) {
            if (isGameOver) return;

            switch (dir) {
                case 'up':
                    if (direction.y === 0) direction = { x: 0, y: -1 };
                    break;
                case 'down':
                    if (direction.y === 0) direction = { x: 0, y: 1 };
                    break;
                case 'left':
                    if (direction.x === 0) direction = { x: -1, y: 0 };
                    break;
                case 'right':
                    if (direction.x === 0) direction = { x: 1, y: 0 };
                    break;
            }
        }

        // 键盘控制
        document.addEventListener('keydown', (e) => {
            switch (e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    e.preventDefault();
                    changeDirection('up');
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    e.preventDefault();
                    changeDirection('down');
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    e.preventDefault();
                    changeDirection('left');
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    e.preventDefault();
                    changeDirection('right');
                    break;
                case ' ':
                    e.preventDefault();
                    togglePause();
                    break;
            }
        });

        // 触摸控制（滑动）
        let touchStartX = 0;
        let touchStartY = 0;

        canvas.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });

        canvas.addEventListener('touchend', (e) => {
            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;

            const diffX = touchEndX - touchStartX;
            const diffY = touchEndY - touchStartY;

            if (Math.abs(diffX) > Math.abs(diffY)) {
                if (diffX > 0) {
                    changeDirection('right');
                } else {
                    changeDirection('left');
                }
            } else {
                if (diffY > 0) {
                    changeDirection('down');
                } else {
                    changeDirection('up');
                }
            }
        });

        // 初始化画布
        initGame();
        draw();
    </script>
</body>
</html>
