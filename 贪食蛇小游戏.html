<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>贪食蛇小游戏</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
    overflow: hidden;
  }
  #game-header {
    display: flex;
    align-items: center;
    gap: 40px;
    margin-bottom: 16px;
  }
  #game-header h1 {
    color: #e94560;
    font-size: 28px;
    letter-spacing: 4px;
    text-shadow: 0 0 20px rgba(233,69,96,0.5);
  }
  .stat {
    color: #eee;
    font-size: 16px;
  }
  .stat span {
    color: #0f3460;
    background: #e94560;
    padding: 2px 12px;
    border-radius: 12px;
    font-weight: bold;
    margin-left: 6px;
  }
  #game-container {
    border: 3px solid #e94560;
    border-radius: 8px;
    box-shadow: 0 0 40px rgba(233,69,96,0.3), inset 0 0 40px rgba(0,0,0,0.3);
  }
  #instructions {
    color: #aaa;
    margin-top: 16px;
    font-size: 14px;
    text-align: center;
    line-height: 1.8;
  }
  kbd {
    background: #16213e;
    border: 1px solid #555;
    border-radius: 4px;
    padding: 2px 8px;
    font-size: 13px;
    color: #e94560;
  }
</style>
</head>
<body>

<div id="game-header">
  <h1>SNAKE</h1>
  <div class="stat">得分 <span id="score-display">0</span></div>
  <div class="stat">最高 <span id="high-display">0</span></div>
</div>
<div id="game-container"></div>
<div id="instructions">
  <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> 或 方向键 移动 &nbsp;|&nbsp; <kbd>Space</kbd> 暂停 &nbsp;|&nbsp; <kbd>R</kbd> 重新开始
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<script>
const GRID = 20;
const COLS = 30;
const ROWS = 25;
const W = GRID * COLS;
const H = GRID * ROWS;

let snake, food, dir, nextDir, score, highScore, gameState;
let moveTimer, moveInterval;
let particles = [];
let foodPulse = 0;
let gridFade = [];

function setup() {
  let canvas = createCanvas(W, H);
  canvas.parent('game-container');
  textAlign(CENTER, CENTER);
  highScore = parseInt(localStorage.getItem('snakeHigh') || '0');
  document.getElementById('high-display').textContent = highScore;
  resetGame();
}

function resetGame() {
  let cx = floor(COLS / 2);
  let cy = floor(ROWS / 2);
  snake = [
    { x: cx, y: cy },
    { x: cx - 1, y: cy },
    { x: cx - 2, y: cy }
  ];
  dir = { x: 1, y: 0 };
  nextDir = { x: 1, y: 0 };
  score = 0;
  moveTimer = 0;
  moveInterval = 8;
  gameState = 'ready';
  particles = [];
  gridFade = [];
  for (let i = 0; i < COLS; i++) {
    gridFade[i] = [];
    for (let j = 0; j < ROWS; j++) {
      gridFade[i][j] = 0;
    }
  }
  spawnFood();
  updateScoreDisplay();
}

function spawnFood() {
  let available = [];
  for (let x = 0; x < COLS; x++) {
    for (let y = 0; y < ROWS; y++) {
      let occupied = false;
      for (let s of snake) {
        if (s.x === x && s.y === y) { occupied = true; break; }
      }
      if (!occupied) available.push({ x, y });
    }
  }
  if (available.length > 0) {
    food = random(available);
  }
}

function updateScoreDisplay() {
  document.getElementById('score-display').textContent = score;
  document.getElementById('high-display').textContent = highScore;
}

function addParticles(x, y) {
  for (let i = 0; i < 12; i++) {
    particles.push({
      x: x * GRID + GRID / 2,
      y: y * GRID + GRID / 2,
      vx: random(-3, 3),
      vy: random(-3, 3),
      life: 1,
      r: random(200, 255),
      g: random(50, 100),
      b: random(50, 120),
      size: random(3, 7)
    });
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    let p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life -= 0.025;
    p.size *= 0.97;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawParticles() {
  noStroke();
  for (let p of particles) {
    fill(p.r, p.g, p.b, p.life * 255);
    ellipse(p.x, p.y, p.size);
  }
}

function moveSnake() {
  dir = { x: nextDir.x, y: nextDir.y };
  let head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

  // 穿墙
  if (head.x < 0) head.x = COLS - 1;
  if (head.x >= COLS) head.x = 0;
  if (head.y < 0) head.y = ROWS - 1;
  if (head.y >= ROWS) head.y = 0;

  // 自撞检测
  for (let i = 0; i < snake.length; i++) {
    if (snake[i].x === head.x && snake[i].y === head.y) {
      gameState = 'dead';
      addDeathParticles();
      return;
    }
  }

  snake.unshift(head);

  // 记录蛇经过的轨迹
  if (head.x >= 0 && head.x < COLS && head.y >= 0 && head.y < ROWS) {
    gridFade[head.x][head.y] = 1;
  }

  if (head.x === food.x && head.y === food.y) {
    score += 10;
    if (score > highScore) {
      highScore = score;
      localStorage.setItem('snakeHigh', highScore.toString());
    }
    updateScoreDisplay();
    addParticles(food.x, food.y);
    spawnFood();
    // 加速
    if (moveInterval > 4) moveInterval = max(4, moveInterval - 0.3);
  } else {
    snake.pop();
  }
}

function addDeathParticles() {
  for (let s of snake) {
    for (let i = 0; i < 4; i++) {
      particles.push({
        x: s.x * GRID + GRID / 2,
        y: s.y * GRID + GRID / 2,
        vx: random(-4, 4),
        vy: random(-4, 4),
        life: 1,
        r: random(180, 255),
        g: random(40, 80),
        b: random(60, 100),
        size: random(3, 8)
      });
    }
  }
}

function draw() {
  background(26, 26, 46);
  foodPulse += 0.06;

  // 绘制网格背景淡入淡出
  noStroke();
  for (let i = 0; i < COLS; i++) {
    for (let j = 0; j < ROWS; j++) {
      if (gridFade[i][j] > 0.01) {
        fill(233, 69, 96, gridFade[i][j] * 30);
        rect(i * GRID, j * GRID, GRID, GRID);
        gridFade[i][j] *= 0.93;
      }
    }
  }

  // 绘制网格线
  stroke(255, 255, 255, 12);
  strokeWeight(0.5);
  for (let i = 0; i <= COLS; i++) line(i * GRID, 0, i * GRID, H);
  for (let j = 0; j <= ROWS; j++) line(0, j * GRID, W, j * GRID);

  if (gameState === 'playing' || gameState === 'ready') {
    // 绘制食物
    let pulse = sin(foodPulse) * 3;
    let fx = food.x * GRID + GRID / 2;
    let fy = food.y * GRID + GRID / 2;
    // 光晕
    noStroke();
    fill(233, 69, 96, 40);
    ellipse(fx, fy, GRID + 10 + pulse * 2);
    fill(233, 69, 96, 80);
    ellipse(fx, fy, GRID + pulse);
    // 食物本体
    fill(233, 69, 96);
    ellipse(fx, fy, GRID - 4 + pulse * 0.5);
    fill(255, 150, 170);
    ellipse(fx - 2, fy - 2, 5);

    // 绘制蛇
    for (let i = snake.length - 1; i >= 0; i--) {
      let s = snake[i];
      let t = map(i, 0, snake.length - 1, 1, 0.4);
      let px = s.x * GRID;
      let py = s.y * GRID;
      let cornerR = i === 0 ? 7 : 5;

      // 蛇身光晕
      noStroke();
      fill(233, 69, 96, t * 40);
      rect(px - 1, py - 1, GRID + 2, GRID + 2, cornerR + 2);

      // 蛇身
      let r = lerp(233, 100, 1 - t);
      let g = lerp(69, 40, 1 - t);
      let b = lerp(96, 80, 1 - t);
      fill(r, g, b);
      noStroke();
      rect(px + 1, py + 1, GRID - 2, GRID - 2, cornerR);

      // 蛇身高光
      fill(255, 255, 255, t * 50);
      rect(px + 3, py + 3, GRID - 8, GRID / 2 - 3, 3);

      // 蛇头眼睛
      if (i === 0) {
        let ex1, ey1, ex2, ey2;
        if (dir.x === 1) { ex1 = px + 13; ey1 = py + 5; ex2 = px + 13; ey2 = py + 13; }
        else if (dir.x === -1) { ex1 = px + 5; ey1 = py + 5; ex2 = px + 5; ey2 = py + 13; }
        else if (dir.y === -1) { ex1 = px + 5; ey1 = py + 5; ex2 = px + 13; ey2 = py + 5; }
        else { ex1 = px + 5; ey1 = py + 13; ex2 = px + 13; ey2 = py + 13; }
        fill(255);
        ellipse(ex1, ey1, 5, 5);
        ellipse(ex2, ey2, 5, 5);
        fill(20);
        ellipse(ex1 + dir.x * 1, ey1 + dir.y * 1, 2.5, 2.5);
        ellipse(ex2 + dir.x * 1, ey2 + dir.y * 1, 2.5, 2.5);
      }
    }
  }

  // 粒子
  updateParticles();
  drawParticles();

  // 游戏状态
  if (gameState === 'ready') {
    drawOverlay('按任意方向键开始', '');
  } else if (gameState === 'playing') {
    moveTimer++;
    if (moveTimer >= moveInterval) {
      moveTimer = 0;
      moveSnake();
    }
  } else if (gameState === 'paused') {
    drawOverlay('暂停中', '按 Space 继续');
  } else if (gameState === 'dead') {
    drawOverlay('游戏结束', '得分: ' + score + '  |  按 R 重来');
  }
}

function drawOverlay(mainText, subText) {
  noStroke();
  fill(0, 0, 0, 150);
  rect(0, 0, W, H);

  fill(233, 69, 96);
  textSize(36);
  textStyle(BOLD);
  text(mainText, W / 2, H / 2 - 20);

  if (subText) {
    fill(200);
    textSize(16);
    textStyle(NORMAL);
    text(subText, W / 2, H / 2 + 24);
  }
}

function keyPressed() {
  // 方向控制
  let newDir = null;
  if ((keyCode === UP_ARROW || key === 'w' || key === 'W') && dir.y !== 1) {
    newDir = { x: 0, y: -1 };
  } else if ((keyCode === DOWN_ARROW || key === 's' || key === 'S') && dir.y !== -1) {
    newDir = { x: 0, y: 1 };
  } else if ((keyCode === LEFT_ARROW || key === 'a' || key === 'A') && dir.x !== 1) {
    newDir = { x: -1, y: 0 };
  } else if ((keyCode === RIGHT_ARROW || key === 'd' || key === 'D') && dir.x !== -1) {
    newDir = { x: 1, y: 0 };
  }

  if (newDir) {
    nextDir = newDir;
    if (gameState === 'ready') {
      gameState = 'playing';
    }
  }

  // 暂停
  if (key === ' ') {
    if (gameState === 'playing') gameState = 'paused';
    else if (gameState === 'paused') gameState = 'playing';
  }

  // 重开
  if ((key === 'r' || key === 'R') && gameState === 'dead') {
    resetGame();
  }

  // 阻止默认滚动
  if ([32, 37, 38, 39, 40].includes(keyCode)) return false;
}
</script>

</body>
</html>
